name: Code Review

# This workflow is OPT-IN: it only runs the AI review job when the PR has
# the `ai-review` label. Without the label the job is skipped entirely,
# so no Anthropic tokens are consumed.
#
# To trigger a review: add the `ai-review` label to the PR.
# To re-trigger after pushes: the `synchronize` type is still active, but
# only when the label is present (the job-level `if:` gates execution).
# To stop: remove the label.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Gate execution on the PR having the `ai-review` label. This skips
    # the entire job (no checkout, no API call) when the label is absent.
    if: contains(github.event.pull_request.labels.*.name, 'ai-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run PR review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python .github/workflows/run_review.py